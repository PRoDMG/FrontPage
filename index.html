<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solotechnology</title>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-H5QJEN771S"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-H5QJEN771S');
  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 15px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    .tagline {
      text-align: center;
      margin-bottom: 30px;
      font-style: italic;
      opacity: 0.8;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
    }

    textarea {
      resize: none;
      height: 120px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #00c6ff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #00a2d4;
    }

    .status {
      margin-top: 15px;
      text-align: center;
      font-weight: bold;
    }

    .success {
      color: #00ffae;
    }

    .error {
      color: #ff6b6b;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Solotechnology</h1>
    <div class="tagline">Średnio, ale kto robi dobrze?</div>

    <form id="contact-form">
      <input type="text" name="name" placeholder="Twoje imię" required />
      <input type="email" name="email" placeholder="Twój email" required />
      <textarea name="message" placeholder="Twoja wiadomość" required></textarea>
      <button type="submit">Wyślij wiadomość</button>
    </form>

    <div id="status" class="status"></div>
  </div>

  <script>
    const form = document.getElementById("contact-form");
    const statusDiv = document.getElementById("status");

    form.addEventListener("submit", async function(e) {
      e.preventDefault();

      statusDiv.textContent = "Wysyłanie...";
      statusDiv.className = "status";

      const formData = new FormData(form);

      const data = {
        name: formData.get("name"),
        email: formData.get("email"),
        message: formData.get("message")
      };

      try {
        const response = await fetch("/api/contact", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(data)
        });

        const result = await response.json();

        if (response.ok) {
          statusDiv.textContent = "Wiadomość wysłana pomyślnie 🚀";
          statusDiv.className = "status success";
          form.reset();
        } else {
          statusDiv.textContent = result.message || "Wystąpił błąd.";
          statusDiv.className = "status error";
        }

      } catch (error) {
        statusDiv.textContent = "Błąd połączenia z serwerem.";
        statusDiv.className = "status error";
      }
    });
  </script>

</body>
</html>
